<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // QUAD APERTURE</title>
    
    <script src="q-ui-global.js?v=16.4"></script>
    <script src="q-core.js?v=16.4"></script>
    <script src="q-ui-planner.js?v=16.4"></script>
    <script src="q-hub.js?v=16.4"></script>
    
    <script>
        // IRONCLAD MOBILE BYPASS
        if (/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            document.documentElement.classList.add('is-mobile-device');
        }
        
        // BOOT STATE HANDLER
        if(sessionStorage.getItem('Q_BOOT_COMPLETE') === 'true') {
            document.write('<style>#boot-overlay { display: none !important; }</style>');
            window.addEventListener('DOMContentLoaded', () => {
                document.body.classList.remove('boot-active');
            });
        }
    </script>

    <style>
        /* --- VOID AESTHETIC OVERRIDES (FORCES OVER GLOBAL INJECTIONS) --- */
        :root {
            --void: #000000 !important; 
            --theme-main: #ffffff !important;
            --theme-dim: rgba(255, 255, 255, 0.2) !important;
            --starlight: rgba(255, 255, 255, 0.8) !important;
        }

        * { font-family: 'Courier New', Courier, monospace !important; }

        body {
            background: #000000 !important;
            color: #ffffff !important;
            margin: 0; height: 100dvh; width: 100vw; overflow: hidden; overscroll-behavior: none;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none;
            perspective: 1500px; transform-style: preserve-3d; touch-action: manipulation;
        }

        /* Force all injected UI (Wings, Nav, Controls) to Black/White Blueprint */
        .wing-content, .q-nav-bar, .vector-anchor, .modal-box, .q-global-controls {
            background: #000000 !important;
            border-color: #ffffff !important;
            color: #ffffff !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        .w-head, .w-lbl, .val-lg, .q-prefix, .q-val, .fmt-toggle, .q-nav-brand, .q-nav-btn {
            color: #ffffff !important;
            text-shadow: none !important;
            border-color: #ffffff !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        /* Specific Aperture Scaffolding (The 4 Vectors) */
        .vector-anchor {
            position: absolute; width: calc(var(--mod-w) + 50px); height: auto; min-height: 160px; z-index: 100; cursor: pointer; pointer-events: auto; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            padding: 22px; box-sizing: border-box; transition: all 0.2s ease; 
            border-radius: 0 !important; /* Stark structural edges */
            border: 1px solid #ffffff !important;
            transform: translateZ(0);
        }
        
        .vector-anchor:hover { background: #ffffff !important; color: #000000 !important; }
        .vector-anchor:hover * { color: #000000 !important; border-color: #000000 !important; }
        
        .tl { top: 7vh; left: 2vw; }
        .tr { top: 7vh; right: 2vw; }
        .bl { bottom: 8vh; left: 2vw; }
        .br { bottom: 8vh; right: 2vw; }
        
        .v-head { font-weight: bold; font-size: 1.15rem; letter-spacing: 2px; margin-bottom: 12px; width: 100%; border-bottom: 1px dashed #ffffff; padding-bottom: 6px; transition: all 0.2s ease; }

        /* The Iris (Center Dial) */
        .gear-container {
            position: absolute; width: var(--dial-size); height: var(--dial-size); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; z-index: 30; transform: translateZ(-50px);
            background: #000000 !important;
            border: 1px solid #ffffff !important;
            box-shadow: none !important;
            overflow: hidden !important; /* Constrains the starfield strictly to the dial */
        }
        
        /* Remove default Chronoface inner rings/gradients */
        .gear-container::after { display: none !important; }

        .rotating-q {
            position: absolute;
            font-size: 150px;
            font-weight: bold;
            color: #ffffff;
            animation: spinY 5s linear infinite;
            z-index: 50;
        }
        @keyframes spinY { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

    </style>
</head>
<body class="mode-q boot-active">

    <div class="vector-anchor telemetry-node tl" onclick="window.location.href='index.html'" ontouchstart="window.location.href='index.html'; event.preventDefault();">
        <div class="v-head">PERSONAL QUAD</div>
        <div style="font-size: 0.75rem;">[ NODE 01 - ACTIVE ]</div>
    </div>
    
    <div class="vector-anchor telemetry-node tr" onclick="window.location.href='COMVECHUD.html'" ontouchstart="window.location.href='COMVECHUD.html'; event.preventDefault();">
        <div class="v-head">COMMERCIAL QUAD</div>
        <div style="font-size: 0.75rem;">[ NODE 02 - ENTERPRISE ]</div>
    </div>
    
    <div class="vector-anchor telemetry-node bl" onclick="alert('Routing to Documents/Manuscripts...');" ontouchstart="alert('Routing to Documents...'); event.preventDefault();">
        <div class="v-head">DOCS / MANUSCRIPTS</div>
        <div style="font-size: 0.75rem;">[ THE ETERNAL NOW ]</div>
    </div>
    
    <div class="vector-anchor telemetry-node br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()" ontouchstart="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub(); event.preventDefault();">
        <div class="v-head">GLOBAL DASHBOARD</div>
        <div style="font-size: 0.75rem;">[ SYSTEMS OVERVIEW ]</div>
    </div>

    <div class="gear-container q-center-dial">
        <div id="aperture-stars" style="position: absolute; width: 100%; height: 100%; pointer-events: none;"></div>
        <div class="rotating-q">Q</div>
    </div>

    <script>
        // Mount the kinetic starfield specifically inside the aperture dial
        document.addEventListener('DOMContentLoaded', () => {
            if (window.generateStars) window.generateStars('aperture-stars');
        });
    </script>
</body>
</html>
