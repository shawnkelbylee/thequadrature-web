<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quadrature | Temporal Operating System</title>
    <style>
        :root {
            --bg-color: #000000;
            --line-color: #ffffff;
            --dim-line: #444444;
            --accent-glow: rgba(255, 255, 255, 0.2);
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--line-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* --- HEADER / TAGLINE --- */
        header {
            width: 100%;
            text-align: center;
            padding: 40px 20px 0;
            z-index: 10;
        }

        h1 {
            font-weight: normal;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- MAIN DIAL & CLOCKS CONTAINER --- */
        .nexus-core {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 1200px;
            flex-grow: 1;
        }

        /* --- CENTRAL Q-DIAL (SVG BLUEPRINT) --- */
        .q-dial {
            position: relative;
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .q-dial svg {
            width: 100%;
            height: 100%;
            stroke: var(--line-color);
            fill: none;
            stroke-width: 1;
        }

        /* --- CHRONOMETERS --- */
        .clock-container {
            position: absolute;
            bottom: 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clock-container.scientific { left: 5%; }
        .clock-container.civil { right: 5%; }

        .clock-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--dim-line);
            padding-bottom: 5px;
        }

        .clock {
            width: 150px;
            height: 150px;
            border: 1px solid var(--dim-line);
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .clock::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 6px; height: 6px;
            background: var(--line-color);
            border-radius: 50%;
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: var(--line-color);
            transform: translateX(-50%);
            z-index: 5;
        }

        .hour-hand { width: 2px; height: 40px; }
        .minute-hand { width: 1px; height: 60px; }
        .second-hand { width: 1px; height: 70px; background: #888; z-index: 6; }

        /* --- FOOTER PROTOCOLS --- */
        footer {
            width: 100%;
            max-width: 1000px;
            padding: 0 20px 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            z-index: 10;
        }

        .protocol-link {
            border: 1px solid var(--dim-line);
            padding: 15px 10px;
            text-decoration: none;
            color: var(--line-color);
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .protocol-link:hover {
            border-color: var(--line-color);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .protocol-link::before {
            content: '[ ';
            opacity: 0.3;
        }
        .protocol-link::after {
            content: ' ]';
            opacity: 0.3;
        }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .nexus-core { flex-direction: column; }
            .clock-container { position: relative; bottom: auto; left: auto; right: auto; margin: 20px 0; }
            footer { grid-template-columns: 1fr 1fr; }
            .q-dial { width: 300px; height: 300px; margin: 30px 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Based in Science, Bathed in Culture, and Built for the Digital Age.</h1>
    </header>

    <main class="nexus-core">
        
        <div class="clock-container scientific">
            <div class="clock-label">Scientific Time // TT</div>
            <div class="clock" id="sci-clock">
                <div class="hand hour-hand" id="sci-hour"></div>
                <div class="hand minute-hand" id="sci-minute"></div>
                <div class="hand second-hand" id="sci-second"></div>
            </div>
        </div>

        <div class="q-dial">
            <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <circle cx="200" cy="200" r="190" stroke-width="2"/>
                <circle cx="200" cy="200" r="180" stroke-width="0.5" stroke-dasharray="4 4"/>
                <circle cx="200" cy="200" r="140" stroke-width="1"/>
                
                <line x1="10" y1="200" x2="390" y2="200" stroke-width="0.5" stroke-dasharray="2 6"/>
                <line x1="200" y1="10" x2="200" y2="390" stroke-width="0.5" stroke-dasharray="2 6"/>
                
                <circle cx="200" cy="200" r="80" stroke-width="4"/>
                <line x1="250" y1="250" x2="320" y2="320" stroke-width="4"/>
                <line x1="320" y1="320" x2="340" y2="300" stroke-width="2"/>
            </svg>
        </div>

        <div class="clock-container civil">
            <div class="clock-label">Civil Time // UTC</div>
            <div class="clock" id="civ-clock">
                <div class="hand hour-hand" id="civ-hour"></div>
                <div class="hand minute-hand" id="civ-minute"></div>
                <div class="hand second-hand" id="civ-second"></div>
            </div>
        </div>

    </main>

    <footer>
        <a href="#" class="protocol-link">Documents</a>
        <a href="https://thequadrature.app" class="protocol-link">The Quad (App)</a>
        <a href="#" class="protocol-link">System Dashboard</a>
        <a href="#" class="protocol-link">Node Unassigned</a>
    </footer>

    <script>
        function updateClocks() {
            const now = new Date();
            
            // Base Time Calculations
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // Degrees
            const secondDeg = ((seconds / 60) * 360);
            const minuteDeg = ((minutes / 60) * 360) + ((seconds/60)*6);
            
            // Civil Time (Standard 12hr rotation)
            const civHourDeg = ((hours % 12) / 12) * 360 + ((minutes/60)*30);
            
            document.getElementById('civ-second').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
            document.getElementById('civ-minute').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('civ-hour').style.transform = `translateX(-50%) rotate(${civHourDeg}deg)`;

            // Scientific Time (Simulating a slight offset for visual distinction of TT/Quad OS)
            // Note: Replace this offset math with actual Q Logic algorithms later.
            const sciHourDeg = civHourDeg + 15; // Placeholder 15-degree visual offset
            
            document.getElementById('sci-second').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
            document.getElementById('sci-minute').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById('sci-hour').style.transform = `translateX(-50%) rotate(${sciHourDeg}deg)`;
        }

        setInterval(updateClocks, 1000);
        updateClocks(); // Initial call
    </script>
</body>
</html>
