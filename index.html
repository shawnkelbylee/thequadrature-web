<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quadrature | System Standby</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            letter-spacing: 4px;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-weight: normal;
            font-size: 1.5rem;
            letter-spacing: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        p {
            font-size: 0.8rem;
            color: #888888;
            line-height: 1.8;
            letter-spacing: 6px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #ffffff;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 5px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE QUADRATURE<span class="cursor"></span></h1>
        <p>SYSTEM INITIALIZATION IN PROGRESS</p>
        <p>STANDBY FOR NODE SYNCHRONIZATION</p>
    </div>
</body>
</html>
