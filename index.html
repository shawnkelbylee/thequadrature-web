<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // THE APERTURE</title>
    
    <script src="q-core.js?v=16.5"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700;900&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --void: #000000;
            --pure-white: #ffffff;
            --dim-white: rgba(255, 255, 255, 0.4);
            --grid-line: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            background-color: var(--void); color: var(--pure-white); 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; justify-content: center; align-items: center; 
            user-select: none; -webkit-user-select: none;
        }

        /* CONSTRAINED STARFIELD */
        .void-matrix {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: 
                radial-gradient(1px 1px at 15% 25%, #ffffff 100%, transparent),
                radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,0.5) 100%, transparent),
                radial-gradient(1px 1px at 75% 65%, #ffffff 100%, transparent),
                radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.3) 100%, transparent),
                radial-gradient(1px 1px at 25% 75%, rgba(255,255,255,0.7) 100%, transparent),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 200px 200px, 150px 150px, 250px 250px, 100px 100px, 300px 300px, 50px 50px, 50px 50px;
            opacity: 0.6; pointer-events: none;
        }

        /* TERMINAL INITIALIZATION CRAWL */
        .terminal-container {
            position: absolute; bottom: 30px; left: 30px; z-index: 100;
            display: flex; flex-direction: column; gap: 6px;
            font-size: 0.75rem; color: var(--dim-white); font-weight: 700;
            pointer-events: none; text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .terminal-line { animation: type-in 0.1s ease-out forwards; }
        @keyframes type-in { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .telemetry-block {
            margin-top: 15px; border-top: 1px dashed var(--dim-white); padding-top: 10px;
            display: none; flex-direction: column; gap: 4px; color: var(--pure-white);
        }

        .telemetry-row { display: flex; gap: 10px; }
        .telemetry-lbl { color: var(--dim-white); width: 80px; }

        /* THE 4-BLADE KINETIC MECHANICAL IRIS */
        .aperture-housing {
            position: relative; width: 400px; height: 400px; z-index: 50;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; cursor: pointer;
            transition: transform 2s cubic-bezier(0.8, 0, 0.2, 1), filter 2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .aperture-housing:hover { border-color: rgba(255,255,255,0.5); box-shadow: 0 0 40px rgba(255,255,255,0.1), inset 0 0 20px rgba(255,255,255,0.1); }

        .blade {
            position: absolute; width: 200%; height: 200%; background: var(--void);
            border: 1px solid rgba(255,255,255,0.3); transform-origin: center;
            transition: transform 1.8s cubic-bezier(0.75, 0, 0.15, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        /* Geometry to form the closed iris */
        .blade-1 { top: -100%; left: -100%; transform: rotate(0deg) translateX(45%); }
        .blade-2 { top: -100%; right: -100%; transform: rotate(90deg) translateX(45%); }
        .blade-3 { bottom: -100%; right: -100%; transform: rotate(180deg) translateX(45%); }
        .blade-4 { bottom: -100%; left: -100%; transform: rotate(270deg) translateX(45%); }

        /* Open state overrides */
        .aperture-housing.engaged .blade-1 { transform: rotate(0deg) translateX(120%); }
        .aperture-housing.engaged .blade-2 { transform: rotate(90deg) translateX(120%); }
        .aperture-housing.engaged .blade-3 { transform: rotate(180deg) translateX(120%); }
        .aperture-housing.engaged .blade-4 { transform: rotate(270deg) translateX(120%); }

        /* CENTRAL 'Q' */
        .q-core-insignia {
            position: absolute; z-index: 60; font-family: 'Orbitron', sans-serif;
            font-size: 7rem; font-weight: 900; color: var(--pure-white);
            opacity: 0; transform: scale(0.8);
            transition: opacity 1.5s ease 1s, transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 1s;
            text-shadow: 0 0 30px rgba(255,255,255,0.6); pointer-events: none;
        }

        .aperture-housing.engaged .q-core-insignia { opacity: 1; transform: scale(1); }

        /* BLUR MODE (LOGARITHMIC ACCELERATION) */
        .aperture-housing.warp-drive {
            transform: scale(5) rotate(45deg);
            filter: blur(25px) brightness(3);
        }

        .warp-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            background: #fff; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease-in;
        }
        .warp-flash.active { opacity: 1; }

    </style>
</head>
<body>

    <div class="void-matrix"></div>

    <div class="terminal-container" id="sys-terminal"></div>

    <div class="aperture-housing" id="aperture-gateway" onclick="triggerBifurcation()">
        <div class="blade blade-1"></div>
        <div class="blade blade-2"></div>
        <div class="blade blade-3"></div>
        <div class="blade blade-4"></div>
        <div class="q-core-insignia" id="q-insignia">Q</div>
    </div>

    <div class="warp-flash" id="warp-flash"></div>

    <script>
        const terminal = document.getElementById('sys-terminal');
        const telemetryBlock = document.createElement('div');
        telemetryBlock.className = 'telemetry-block';
        let telemetryInterval;

        const bootSequence = [
            "SYS_INIT: THE QUADRATURE GATEWAY v16.5",
            "ESTABLISHING BARYCENTRIC UPLINK...",
            "ENFORCING ZERO-REDUNDANCY PROTOCOL...",
            "BYPASSING LEGACY UI SCRIPTS...",
            "AWAITING ARCHITECT INTENT."
        ];

        // 1. TERMINAL INITIALIZATION CRAWL
        function runBootCrawl(index = 0) {
            if (index < bootSequence.length) {
                const line = document.createElement('div');
                line.className = 'terminal-line';
                line.innerText = `> ${bootSequence[index]}`;
                terminal.appendChild(line);
                setTimeout(() => runBootCrawl(index + 1), 400 + Math.random() * 200);
            } else {
                setTimeout(engageAperture, 600);
            }
        }

        // 2. ENGAGE APERTURE (OPEN BLADES)
        function engageAperture() {
            document.getElementById('aperture-gateway').classList.add('engaged');
            terminal.appendChild(telemetryBlock);
            telemetryBlock.style.display = 'flex';
            updateTelemetry();
            telemetryInterval = setInterval(updateTelemetry, 1000);
        }

        // 3. LIVE TELEMETRY FEED
        function updateTelemetry() {
            let lat = "CALCULATING"; let lon = "CALCULATING";
            if (window.Q_STATE && window.Q_STATE.location && window.Q_STATE.location.synced) {
                lat = window.Q_STATE.location.lat.toFixed(4);
                lon = window.Q_STATE.location.lon.toFixed(4);
            }
            
            // Memory reading (if supported by browser)
            let mem = performance.memory ? (performance.memory.usedJSHeapSize / 1048576).toFixed(2) + " MB" : "N/A";
            
            // Mock ping variance for visual kinetic feedback
            let ping = Math.floor(Math.random() * 12 + 8) + "ms";

            telemetryBlock.innerHTML = `
                <div class="telemetry-row"><span class="telemetry-lbl">COORD:</span><span>${lat}, ${lon}</span></div>
                <div class="telemetry-row"><span class="telemetry-lbl">MEMORY:</span><span>${mem}</span></div>
                <div class="telemetry-row"><span class="telemetry-lbl">LATENCY:</span><span>${ping}</span></div>
            `;
        }

        // 4. BIFURCATION TRIGGER (LOGARITHMIC ACCELERATION -> BLUR MODE)
        let isBifurcating = false;
        function triggerBifurcation() {
            if (isBifurcating || !document.getElementById('aperture-gateway').classList.contains('engaged')) return;
            isBifurcating = true;
            
            clearInterval(telemetryInterval);
            
            // Logarithmic acceleration visual state
            const gateway = document.getElementById('aperture-gateway');
            gateway.classList.add('warp-drive');
            
            const actionLine = document.createElement('div');
            actionLine.className = 'terminal-line';
            actionLine.style.color = '#fff';
            actionLine.style.marginTop = '10px';
            actionLine.style.fontFamily = "'Orbitron', sans-serif";
            actionLine.innerText = ">> ROUTING TO OS ENGINE (PERSONAL QUAD)...";
            terminal.appendChild(actionLine);

            // White-out flash right before redirect
            setTimeout(() => {
                document.getElementById('warp-flash').classList.add('active');
            }, 1600);

            // Final redirect to namespaced Engine Room
            setTimeout(() => {
                window.location.href = "https://thequadrature.app/personal/index.html";
            }, 2000);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runBootCrawl, 500);
        });

    </script>
</body>
</html>
